name: release

on:
  schedule:
    # Nightly, after the bulk of the day's merges and before the EU morning.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      module:
        description: Release only this module (subproject directory name)
        required: false
        type: string
      dry_run:
        description: Validate manifests and build zips without calling the API
        required: false
        type: boolean
        default: false

permissions:
  contents: read

# Overlapping runs could race on create-vs-update for the same script.
concurrency:
  group: release-scripts
  cancel-in-progress: false

jobs:
  release:
    # Forks inherit the schedule but must never publish (and lack the secrets anyway).
    if: github.repository == 'TribotRS/Tribot-Community-Automations'
    # The API credentials live in this environment, not in repo-level secrets, so
    # they are only exposed to jobs that declare it and can be branch-restricted.
    environment: Release
    runs-on: ubuntu-latest
    # Each module can poll a source update for up to 10 minutes, so several
    # releasing modules in one run need far more headroom than a single one.
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # Since Gradle 8 the root build no longer runs buildSrc tests, so the release
      # pipeline's wire-format tests must be invoked explicitly before publishing.
      - name: Test release pipeline
        run: ./gradlew :buildSrc:test --no-daemon --stacktrace

      - name: Release scripts
        env:
          TRIBOT_API_BASE_URL: ${{ secrets.TRIBOT_API_BASE_URL }}
          TRIBOT_API_KEY: ${{ secrets.TRIBOT_API_KEY }}
          TRIBOT_AUTHOR_USER_ID: ${{ secrets.TRIBOT_AUTHOR_USER_ID }}
          # Inputs go through env vars instead of being interpolated into the script
          # text; on a public repo a crafted input would otherwise be shell injection.
          RELEASE_MODULE: ${{ inputs.module }}
          RELEASE_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          args=()
          if [ -n "$RELEASE_MODULE" ]; then
            args+=("-PreleaseOnly=$RELEASE_MODULE")
          fi
          if [ "$RELEASE_DRY_RUN" = "true" ]; then
            args+=("-PreleaseDryRun=true")
          fi
          ./gradlew releaseScripts --no-daemon --stacktrace "${args[@]}"
